    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        body {
            background: linear-gradient(180deg, #162A46, #1E3A66);
            min-height: 100vh; color: white;
            padding-bottom: 85px; overflow-x: hidden;
        }
        .page { display: none; padding: 12px; }
        .page.active { display: block; }

        .top-bar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 15px; margin-bottom: 10px;
            background: rgba(0,0,0,0.25); border-radius: 12px;
        }
        .user-level { display: flex; align-items: center; gap: 8px; }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: contain; }
        .stat-box { display: flex; align-items: center; gap: 5px; font-size: 14px; font-weight: bold; }
        .icon-stat { font-size: 18px; }
        .lang-btn { font-size: 13px; padding: 4px 8px; border-radius: 8px; background: rgba(255,215,0,0.2); border: 1px solid rgba(255,215,0,0.4); cursor: pointer; }

        .info-row {
            display: flex; justify-content: space-around; margin-bottom: 12px;
            background: rgba(255,215,0,0.1); border-radius: 10px; padding: 10px;
        }
        .info-col { text-align: center; font-size: 12px; }
        .info-num { font-weight: bold; color: #FFD700; font-size: 15px; }

        .miner-container {
            position: relative; width: 280px; height: 280px;
            margin: 30px auto; cursor: pointer;
        }
        .bg-ring {
            position: absolute; width: 100%; height: 100%; border-radius: 50%;
            background: rgba(255,215,0,0.1); border: 3px solid rgba(255,215,0,0.3);
        }
        .progress-ring {
            position: absolute; width: 100%; height: 100%; border-radius: 50%;
            background: conic-gradient(#FFD700 0deg, transparent 0deg);
            mask: radial-gradient(transparent 65%, #000 66%);
            -webkit-mask: radial-gradient(transparent 65%, #000 66%);
            transition: none;
        }
        .inner-circle {
            position: absolute; width: 82%; height: 82%; top: 9%; left: 9%; border-radius: 50%;
            background: radial-gradient(circle, #4A3F25, #2B2516);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 4px solid #FFD700;
            box-shadow: 0 0 40px rgba(255,215,0,0.4);
            transition: all 0.3s;
        }
        .inner-circle.active { border-color: #00FF80; box-shadow: 0 0 50px rgba(0,255,128,0.5); }
        .inner-circle.stopped { border-color: #ff4444; box-shadow: 0 0 50px rgba(255,68,68,0.5); }

        .miner-icon { font-size: 40px; margin-bottom: 5px; }
        .time-center { font-size: 22px; font-weight: bold; color: #FFD700; margin-bottom: 5px; }
        .status-center { font-size: 12px; opacity: 0.9; text-align: center; padding: 0 10px; margin-bottom: 8px; }
        .speed-center { font-size: 11px; color: #FFD700; opacity: 0.8; }

        .start-btn {
            padding: 10px 25px; border: none; border-radius: 50px;
            font-weight: bold; font-size: 14px; cursor: pointer; transition: 0.2s; margin-top: 8px;
        }
        .start-btn.active { background: #00FF80; color: #00331A; }
        .start-btn.stopped { background: #FFD700; color: #1A1400; }
        .start-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .side-menu {
            position: fixed; top: 140px; display: flex; flex-direction: column; gap: 12px;
        }
        .side-left { left: 12px; }
        .side-right { right: 12px; }
        .side-btn {
            width: 70px; padding: 10px 5px; border-radius: 12px;
            background: rgba(255,215,0,0.15); border: 1px solid rgba(255,215,0,0.3);
            text-align: center; font-size: 11px; cursor: pointer; position: relative;
        }
        .side-btn .icon { font-size: 22px; margin-bottom: 4px; }

        .box {
            background: rgba(255,255,255,0.08); border-radius: 12px; padding: 15px;
            margin-bottom: 12px; border: 1px solid rgba(255,215,0,0.2);
        }
        .box h4 { margin-bottom: 8px; font-size: 15px; color: #FFD700; }
        .box p { font-size: 13px; opacity: 0.8; line-height: 1.6; }

        .stat-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 0; border-bottom: 1px solid rgba(255,215,0,0.1); font-size: 14px;
        }
        .stat-row:last-child { border-bottom: none; }
        .stat-val { font-weight: bold; color: #FFD700; font-size: 16px; }

        .btn {
            width: 100%; padding: 12px; border: none; border-radius: 10px;
            font-weight: bold; font-size: 14px; cursor: pointer; margin-top: 8px; transition: 0.2s;
        }
        .btn.yellow { background: #FFD700; color: #1A1400; }
        .btn.green { background: #00FF80; color: #00331A; }
        .btn.gray { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.3); }

        .bottom-menu {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: rgba(0,30,80,0.95); backdrop-filter: blur(10px);
            display: flex; justify-content: space-around; padding: 10px 0 12px;
            border-top: 1px solid rgba(255,215,0,0.2);
        }
        .menu-item { text-align: center; font-size: 11px; opacity: 0.7; cursor: pointer; transition: 0.2s; }
        .menu-item.active { color: #FFD700; opacity: 1; font-weight: bold; }
        .menu-icon { font-size: 20px; display: block; margin-bottom: 2px; }

        .notif {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
            background: rgba(0,0,0,0.9); padding: 15px 25px; border-radius: 10px;
            border: 1px solid #FFD700; z-index: 9999; display: none; font-size: 15px; font-weight: bold;
        }

        .lang-select { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background: #1a1a1a; border: 2px solid #FFD700; border-radius: 12px; padding: 20px; z-index: 99999; width: 85%; max-width: 300px; }
        .lang-select.show { display: block; }
        .lang-option { padding: 10px; margin: 5px 0; border-radius: 8px; cursor: pointer; border: 1px solid rgba(255,215,0,0.3); text-align: center; }
        .lang-option:hover { background: rgba(255,215,0,0.15); }
    </style>
</head>

 NFT_BONUS: { "Common":{speed:0.1,duration:0}, "Rare":{speed:0.3,duration:7200}, "Epic":{speed:0.6,duration:14400}, "Legendary":{speed:1.0,duration:21600} }
};

let tonConnect = null, walletAddr = null, validNfts = [], minerInterval = null;
const userData = tgApp.initDataUnsafe || {};
const userId = userData.user?.id || `guest_${Date.now()}`;
let refCode = userData.startParam || null;

let data = JSON.parse(localStorage.getItem('capyTitanMiner_' + userId)) || {
 coins: refCode?250:0, level:1, nextTarget:1000, invites:0, activeRefs:0, gotRefBonus:false,
 endTime:0, mineSpeed:CONFIG.BASE_SPEED, mineDuration:CONFIG.BASE_DURATION, hasStartedMining:false, gotWelcomeBonus:false
};

const elScore = document.getElementById('score');
const elLevel = document.getElementById('level');
const elTarget = document.getElementById('targetLevel');
const elProgressRing = document.getElementById('progressRing');
const elInnerCircle = document.getElementById('innerCircle');
const elTimeCenter = document.getElementById('timeCenter');
const elStatusCenter = document.getElementById('statusCenter');
const elBtnMiner = document.getElementById('btnMiner');
const elCoinsPerHour = document.getElementById('coinsPerHour');
const elNftList = document.getElementById('nftList');
const elFriendCount = document.getElementById('friendCount');
const elInviteLink = document.getElementById('inviteLink');
const elNotif = document.getElementById('notif');
const elTotalUsers = document.getElementById('totalUsers');
const elActiveUsers = document.getElementById('activeUsers');
const elMiningNow = document.getElementById('miningNow');
const elBtnConnectWallet = document.getElementById('btnConnectWallet');

function showNotif(msg){elNotif.innerText=msg;elNotif.style.display='block';setTimeout(()=>elNotif.style.display='none',2500);}
function switchPage(id,elm){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById(id).classList.add('active');document.querySelectorAll('.menu-item').forEach(m=>m.classList.remove('active'));if(elm)elm.classList.add('active');}
function openLink(url){tgApp.openLink(url);}
function copyLink(){navigator.clipboard.writeText(elInviteLink.innerText);showNotif('✅ Link copied!');}
function shareLink(){tgApp.openLink(`https://t.me/share/url?url=${encodeURIComponent(elInviteLink.innerText)}&text=${encodeURIComponent('Mine Capybara Titan 🚀')}`);}
function formatTime(sec){sec=Math.max(0,Math.floor(sec));let h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60),s=sec%60;return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;}

async function loadStatsFromBot(){try{tgApp.sendData(JSON.stringify({action:"get_stats"}));}catch{elTotalUsers.innerText="1,247";elActiveUsers.innerText="389";elMiningNow.innerText="156";}}
tgApp.onEvent('message',e=>{try{const d=JSON.parse(e.data);if(d.action==="stats_result"){elTotalUsers.innerText=d.total_users.toLocaleString();elActiveUsers.innerText=d.active_today.toLocaleString();elMiningNow.innerText=d.mining_now.toLocaleString();}}catch{}});

function calculateFinalSpeed(){let b=data.activeRefs*REF_BONUS_PER_REF;validNfts.forEach(n=>{const r=n.metadata.attributes?.find(x=>x.trait_type==='Rarity')?.value||'Common';b+=CONFIG.NFT_BONUS[r].speed;});b=Math.min(b,MAX_TOTAL_BONUS_RATE);const p=BASE_COINS_PER_HOUR*(1+b);return{perHour:p,perSec:p/3600};}
function updateUI(){const s=calculateFinalSpeed();elScore.innerText=Math.floor(data.coins).toLocaleString();elLevel.innerText=data.level;elTarget.innerText=`${Math.floor(data.coins).toLocaleString()} / ${data.nextTarget.toLocaleString()}`;elFriendCount.innerText=data.activeRefs;elInviteLink.innerText=`https://t.me/${CONFIG.BOT_NAME}?start=${userId}`;elCoinsPerHour.innerText=s.perHour.toFixed(1);data.mineSpeed=s.perSec;localStorage.setItem('capyTitanMiner_'+userId,JSON.stringify(data));}

// === INTEGRASI ADSGRAM ===
async function showAdThenStart(){
 try{
  if(window.Adsgram){
   const ad = window.Adsgram.init({ blockId: ADSGRAM_ID });
   ad.on('reward', ()=>{ startMining(); showNotif('✅ Iklan selesai, tambang dimulai!'); });
   ad.on('error', (err)=>{ console.log('Adsgram error:', err); startMining(); showNotif('ℹ️ Iklan tidak tersedia, langsung mulai'); });
   ad.show();
  }else{
   startMining();
   showNotif('✅ Mulai menambang!');
  }
 }catch{
  startMining();
  showNotif('✅ Mulai menambang!');
 }
}

function checkMinerStatus(){const n=Math.floor(Date.now()/1000);let r=data.endTime-n;r=Math.max(0,r);if(r>0){const p=r/data.mineDuration;elProgressRing.style.background=`conic-gradient(#FFD700 ${(1-p)*360}deg, transparent ${(1-p)*360}deg)`;elInnerCircle.className='inner-circle active';elTimeCenter.innerText=formatTime(r);elBtnMiner.disabled=true;return true;}else{elProgressRing.style.background=`conic-gradient(#FFD700 0deg, transparent 0deg)`;elInnerCircle.className='inner-circle stopped';elTimeCenter.innerText='00:00:00';elBtnMiner.disabled=false;return false;}}
function startMining(){const n=Math.floor(Date.now()/1000);if(!data.hasStartedMining&&!data.gotWelcomeBonus){data.coins+=NEW_MEMBER_BONUS;data.gotWelcomeBonus=true;showNotif('🎉 Welcome +500 Coin!');}if(!data.hasStartedMining){data.hasStartedMining=true;if(refCode){const inv=JSON.parse(localStorage.getItem('capyTitanMiner_'+refCode))||null;if(inv){inv.activeRefs=(inv.activeRefs||0)+1;localStorage.setItem('capyTitanMiner_'+refCode,JSON.stringify(inv));}}}data.endTime=n+data.mineDuration;checkMinerStatus();updateUI();}
function runAuto(){if(minerInterval)clearInterval(minerInterval);minerInterval=setInterval(()=>{if(checkMinerStatus()){data.coins+=data.mineSpeed;if(data.coins>=data.nextTarget){data.level++;data.nextTarget=Math.round(data.nextTarget*1.8);showNotif(`🎉 Level Up ${data.level}!`);}updateUI();}},1000);}

async function initWallet(){try{tonConnect=new window.TonConnectUI({manifestUrl:'https://raw.githubusercontent.com/ton-connect/demo-manifest/main/demo-manifest.json',buttonRootId:null});tonConnect.onStatusChange(async s=>{if(s==='connected'){walletAddr=tonConnect.account.address;elBtnConnectWallet.innerText='✅ Connected';elBtnConnectWallet.disabled=true;await loadNfts();}else{walletAddr=null;validNfts=[];elBtnConnectWallet.innerText=t[curLang].connect_now;elBtnConnectWallet.disabled=false;updateUI();}});}catch{elBtnConnectWallet.innerText='⚠️ Error';}}
async function connectWallet(){if(!tonConnect)await initWallet();try{await tonConnect.openModal();}catch{showNotif('⚠️ Cannot open wallet');}}
async function loadNfts(){if(!walletAddr||CONFIG.COLLECTION_ADDR.includes('_')){showNotif('⚠️ Collection not set');return;}showNotif('🔍 Checking NFT...');try{const r=await fetch(`https://api.getgems.io/v1/nft/items?owner=${walletAddr}&collection=${CONFIG.COLLECTION_ADDR}&limit=50`);const d=await r.json();validNfts=d.items||[];renderNfts();updateUI();showNotif(validNfts.length?`✅ Found ${validNfts.length} NFT!`:'ℹ️ No NFT yet');}catch{showNotif('⚠️ Failed to load NFT');}}
function renderNfts(){elNftList.innerHTML='';if(!validNfts.length){elNftList.innerHTML=`<div class="box"><p style="text-align:center;opacity:0.7;" data-txt="no_nft"></p></div>`;return;}validNfts.forEach(n=>{const r=n.metadata.attributes?.find(x=>x.trait_type==='Rarity')?.value||'Common';const b=CONFIG.NFT_BONUS[r];elNftList.innerHTML+=`<div class="box"><h4>${n.metadata.name||'Capy Miner Pass'}</h4><p>${r} • +${(b.speed*100).toFixed(0)}% Coin • +${b.duration/3600}h</p></div>`;});}

async function init(){updLang();updateUI();checkMinerStatus();runAuto();loadStatsFromBot();await initWallet();}
init();
</script>
</body>
