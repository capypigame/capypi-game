<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Capybara Titan</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@2.0.0/dist/tonconnect-ui.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/@tonconnect/ui@2.0.0/dist/tonconnect-ui.css">
    <script src="https://api.adsgram.ai/js/adsgram.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: linear-gradient(180deg, #162A46, #1E3A66); min-height: 100vh; color: white; padding-bottom: 85px; }
        .page { display: none; padding: 12px; }
        .page.active { display: block; }

        .top-bar { display: flex; align-items: center; justify-content: space-between; padding: 12px 15px; margin-bottom: 12px; background: rgba(0,0,0,0.25); border-radius: 12px; }
        .profile-left { display: flex; align-items: center; gap: 10px; }
        .user-avatar { width: 45px; height: 45px; border-radius: 50%; object-fit: contain; border: 2px solid #FFD700; }
        .profile-info { display: flex; flex-direction: column; gap: 2px; }
        .user-name { font-weight: bold; font-size: 15px; color: #FFD700; }
        .user-status { font-size: 11px; opacity: 0.8; display: flex; gap: 6px; }
        .vip-badge { background: linear-gradient(90deg,#FFD700,#FFA500); color: #1A1400; padding: 1px 6px; border-radius: 4px; font-weight: bold; font-size: 10px; }
        .nft-badge { background: linear-gradient(90deg,#8B5CF6,#3B82F6); color: white; padding: 1px 6px; border-radius: 4px; font-weight: bold; font-size: 10px; }
        .stat-box { display: flex; align-items: center; gap: 4px; font-size: 13px; font-weight: bold; }
        .lang-btn { font-size: 12px; padding: 4px 7px; border-radius: 8px; background: rgba(255,215,0,0.2); border: 1px solid rgba(255,215,0,0.4); cursor: pointer; }

        .info-row { display: flex; justify-content: space-around; margin-bottom: 12px; background: rgba(255,215,0,0.1); border-radius: 10px; padding: 10px; }
        .info-col { text-align: center; font-size: 12px; }
        .info-num { font-weight: bold; color: #FFD700; font-size: 15px; }

        .miner-container { position: relative; width: 180px; height: 180px; margin: 30px auto 15px; }
        .bg-ring { position: absolute; width: 100%; height: 100%; border-radius: 50%; background: rgba(255,215,0,0.1); border: 1px solid rgba(255,215,0,0.3); }
        .progress-ring { position: absolute; width: 100%; height: 100%; border-radius: 50%; background: conic-gradient(#FFD700 0deg, transparent 0deg); mask: radial-gradient(transparent 92%, #000 93%); -webkit-mask: radial-gradient(transparent 92%, #000 93%); }
        .inner-circle { position: absolute; width: 165px; height: 165px; top: 50%; left: 50%; transform: translate(-50%,-50%); border-radius: 50%; background: radial-gradient(circle, #4A3F25, #2B2516); display: flex; flex-direction: column; align-items: center; justify-content: center; border: 4px solid #ff3333; box-shadow: 0 0 40px rgba(255,51,51,0.4); }
        .inner-circle.active { border-color: #00FF80; box-shadow: 0 0 50px rgba(0,255,128,0.5); }
        .miner-icon { font-size: 40px; margin-bottom: 5px; }
        .time-center { font-size: 22px; font-weight: bold; color: #FFD700; margin-bottom: 8px; }
        .speed-center { font-size: 11px; color: #FFD700; opacity: 0.8; }

        .start-btn { display: block; margin: 0 auto; padding: 10px 35px; border: none; border-radius: 50px; font-weight: bold; font-size: 14px; background: #FFD700; color: #1A1400; cursor: pointer; }
        .start-btn.active { background: #00FF80; color: #00331A; }
        .start-btn:disabled { opacity: 0.5; }

        .side-menu { position: fixed; top: 140px; display: flex; flex-direction: column; gap: 12px; }
        .side-left { left: 12px; }
        .side-right { right: 12px; }
        .side-btn { width: 70px; padding: 10px 5px; border-radius: 12px; background: rgba(255,215,0,0.15); border: 1px solid rgba(255,215,0,0.3); text-align: center; font-size: 11px; cursor: pointer; }
        .side-btn .icon { font-size: 22px; margin-bottom: 4px; }

        .box { background: rgba(255,255,255,0.08); border-radius: 12px; padding: 15px; margin-bottom: 12px; border: 1px solid rgba(255,215,0,0.2); }
        .box h4 { margin-bottom: 8px; font-size: 15px; color: #FFD700; }
        .box p { font-size: 13px; opacity: 0.8; line-height: 1.6; }

        .stat-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,215,0,0.1); font-size: 14px; }
        .stat-val { font-weight: bold; color: #FFD700; }

        .btn { width: 100%; padding: 12px; border: none; border-radius: 10px; font-weight: bold; font-size: 14px; cursor: pointer; margin-top: 8px; }
        .btn.yellow { background: #FFD700; color: #1A1400; }
        .btn.green { background: #0099FF; color: white; }
        .btn.gray { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.3); }

        .nft-tier { border-radius: 12px; padding: 12px; margin-bottom: 12px; background: rgba(0,0,0,0.2); border-left: 4px solid; }
        .nft-tier.rare { border-color: #3B82F6; }
        .nft-tier.epic { border-color: #8B5CF6; }
        .nft-tier.legendary { border-color: #F59E0B; }
        .buy-btn { width: 100%; padding: 10px; border-radius: 8px; border: none; font-weight: bold; font-size: 13px; cursor: pointer; margin-top: 8px; }
        .buy-btn.rare { background: #3B82F6; color: white; }
        .buy-btn.epic { background: #8B5CF6; color: white; }
        .buy-btn.legendary { background: #F59E0B; color: #1A1400; }

        .bottom-menu { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0,30,80,0.95); display: flex; justify-content: space-around; padding: 10px 0 12px; border-top: 1px solid rgba(255,215,0,0.2); }
        .menu-item { text-align: center; font-size: 11px; opacity: 0.7; cursor: pointer; }
        .menu-item.active { color: #FFD700; opacity: 1; font-weight: bold; }
        .menu-icon { font-size: 20px; display: block; margin-bottom: 2px; }

        .notif { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background: rgba(0,0,0,0.9); padding: 15px 25px; border-radius: 10px; border: 1px solid #FFD700; z-index: 9999; display: none; font-size: 15px; font-weight: bold; text-align: center; }
        .lang-select { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background: #1a1a1a; border: 2px solid #FFD700; border-radius: 12px; padding: 20px; z-index: 99999; width: 85%; max-width: 300px; }
        .lang-select.show { display: block; }
        .lang-option { padding: 10px; margin: 5px 0; border-radius: 8px; cursor: pointer; border: 1px solid rgba(255,215,0,0.3); text-align: center; }
    </style>
</head>

<div class="page active" id="pageHome">

    <div class="side-menu side-left">

    <div class="side-menu side-right">

        <div class="side-btn" onclick="switchPage('pageStats')"><div class="icon">📊</div><span data-txt="data"></span></div>

        </div>
    </div>

    <button class="start-btn" id="btnMiner" onclick="showAdThenStart()" data-txt="start_mine"></button>

    <div class="box" style="margin-top:20px;">
        <h4 data-txt="rules"></h4>
        <p data-txt="rule_list"></p>

</div>

<div class="page" id="pageInvite">
    <div class="top-bar"><div class="profile-info"><span data-txt="invite_friend"></span></div></div>
    <div class="box">
        <h4 data-txt="invite_stat"></h4>

    <div class="box">
        <h4 data-txt="invite_link"></h4>

</div>

<div class="page" id="pageStats">

        <div class="stat-row"><span data-txt="mining_now"></span><span class="stat-val" id="miningNow">156</span></div>

</div>

<div class="page" id="pageRank">

<div class="page" id="pageNft">

        <button class="btn green" id="btnConnectWallet" onclick="connectWallet()" data-txt="connect_now"></button>

    <div class="box"><p style="text-align:center; opacity:0.7;" data-txt="no_nft"></p></div>
</div>

<div class="page" id="pageMarket">

    <div class="nft-tier rare">
        <div class="tier-header"><span class="tier-name">🔵 Rare</span></div>

        <div class="tier-bonus">⚡ +30% Speed • ⏱️ +2 Jam</div>

        <button class="buy-btn legendary" onclick="window.open('https://getgems.io/collection/legendary-capybara')" data-txt="buy_getgems"></button>
    </div>
</div>

<div class="bottom-menu">
    <div class="menu-item active" onclick="switchPage('pageHome')"><span class="menu-icon">⛏️</span><span data-txt="mine"></span></div>
    <div class="menu-item" onclick="switchPage('pageInvite')"><span class="menu-icon">👥</span><span data-txt="friends"></span></div>
    <div class="menu-item" onclick="switchPage('pageNft')"><span class="menu-icon">💎</span><span data-txt="nft"></span></div>
    <div class="menu-item" onclick="switchPage('pageMarket')"><span class="menu-icon">🛒</span><span data-txt="shop"></span></div>
    <div class="menu-item" onclick="switchPage('pageStats')"><span class="menu-icon">📊</span><span data-txt="data"></span></div>
</div>

 en:{start_mine:"Start Mining",mine_time:"Mining Time",coin_level:"Coin Level",coin_hour:"Coin/Hour",rules:"📜 Mining Rules",rule_list:"✅ New: +500 Coin<br>✅ Base: 10/h<br>✅ +20%/friend<br>✅ Max: 30/h<br>✅ NFT boost",invite_friend:"Invite Friends",invite_stat:"Invite Stats",active_miner:"Active:",reward:"Reward: You +500 • Friend +250",bonus_rule:"Max bonus +200%",invite_link:"Your Link",copy_link:"Copy",share:"Share",platform_data:"Platform Data",users:"Users",total_user:"Total",active_today:"Active Today",mining_now:"Mining Now",ranking:"Ranking",your_rank:"Your Rank",no_rank:"Not ranked",nft_collection:"NFT",connect_wallet:"Connect Wallet",wallet_desc:"Use Tonkeeper/Telegram Wallet",connect_now:"Connect Now",no_nft:"No NFT yet",shop:"Shop",mine:"Mine",friends:"Friends",nft:"NFT",data:"Data",rank:"Rank",nft_effect:"NFT Benefits",nft_bonus:"NFT increases speed & time",max_bonus:"Max total +200%",rare_desc:"Good bonus",epic_desc:"Big bonus",legend_desc:"Max bonus",buy_getgems:"Buy on Getgems",vip:"VIP",nft_owner:"NFT Owner",level_up:"Level Up",mine_done:"Mining Finished!"},

};

let curLang = localStorage.getItem('appLang') || 'en';
const tg = window.Telegram.WebApp; tg.ready(); tg.expand();
const uid = tg.initDataUnsafe?.user?.id || `g${Date.now()}`;
const ref = tg.initDataUnsafe?.startParam;
const ADS = 39513;

let data = JSON.parse(localStorage.getItem('capy_' + uid)) || {
 coins: ref?250:0, level:1, next:1000, refs:0, end:0, spd:10/3600, dur:12*3600, start:false, welcome:false
};
let timer = null;

function updLang(){
 document.querySelectorAll('[data-txt]').forEach(e=>e.innerHTML=t[curLang][e.dataset.txt]||'');
 const u = tg.initDataUnsafe?.user||{};
 document.getElementById('userName').innerText = u.first_name||u.username||'Guest';
 document.getElementById('vipBadge').innerHTML = data.refs>=5?`<span class="vip-badge">${t[curLang].vip}</span>`:'';
}
function setLang(l){curLang=l;localStorage.setItem('appLang',l);updLang();closeLang();}
function openLang(){document.getElementById('langMenu').classList.add('show');}
function closeLang(){document.getElementById('langMenu').classList.remove('show');}

function showNotif(m){const n=document.getElementById('notif');n.innerText=m;n.style.display='block';setTimeout(()=>n.style.display='none',2500);}
function switchPage(id){document.querySelectorAll('.page,.menu-item').forEach(e=>e.classList.remove('active'));document.getElementById(id).classList.add('active');event.target.closest('.menu-item')?.classList.add('active');}
function fmt(s){s=Math.max(0,s);return `${Math.floor(s/3600).toString().padStart(2,'0')}:${Math.floor((s%3600)/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`;}
function calcSpd(){const b=Math.min(1+data.refs*0.2,3);return{b:b*10,s:(b*10)/3600};}
function save(){localStorage.setItem('capy_'+uid,JSON.stringify(data));}
function ui(){const s=calcSpd();document.getElementById('score').innerText=Math.floor(data.coins).toLocaleString();document.getElementById('level').innerText=data.level;document.getElementById('targetLevel').innerText=`${Math.floor(data.coins).toLocaleString()} / ${data.next.toLocaleString()}`;document.getElementById('spdVal').innerText=s.b.toFixed(1);document.getElementById('coinsPerHour').innerText=s.b.toFixed(1);document.getElementById('friendCount').innerText=data.refs;document.getElementById('inviteLink').innerText=`https://t.me/capytap_pibot?start=${uid}`;data.spd=s.s;save();updLang();}

async function showAdThenStart(){
 try{
  if(window.Adsgram){
   const ad = window.Adsgram.init({blockId:ADS});
   ad.on('reward',start); ad.on('error',start); ad.show();
  }else start();
 }catch{start();}
}

function start(){
 const now = Math.floor(Date.now()/1000);
 if(!data.start&&!data.welcome){data.coins+=500;data.welcome=true;showNotif('🎉 +500 Coin!');}
 if(!data.start&&ref){const p=JSON.parse(localStorage.getItem('capy_'+ref)||'null');if(p){p.refs++;localStorage.setItem('capy_'+ref,JSON.stringify(p));}}
 data.start=true; data.end=now+data.dur;
 ui(); run();
}

function run(){
 if(timer)clearInterval(timer);
 timer=setInterval(()=>{
  const now=Math.floor(Date.now()/1000);
  const rem=data.end-now;
  if(rem>0){
   const p=rem/data.dur;
   document.getElementById('progressRing').style.background=`conic-gradient(#FFD700 ${(1-p)*360}deg, transparent ${(1-p)*360}deg)`;
   document.getElementById('innerCircle').classList.add('active');
   document.getElementById('timeCenter').innerText=fmt(rem);
   document.getElementById('btnMiner').disabled=true;
   data.coins+=data.spd;
   if(data.coins>=data.next){data.level++;data.next=Math.round(data.next*1.8);showNotif(`🎉 ${t[curLang].level_up} ${data.level}!`);}
   save();
  }else{
   document.getElementById('progressRing').style.background=`conic-gradient(#FFD700 0deg, transparent 0deg)`;
   document.getElementById('innerCircle').classList.remove('active');
   document.getElementById('timeCenter').innerText='00:00:00';
   document.getElementById('btnMiner').disabled=false;
   showNotif(t[curLang].mine_done);
  }
 },1000);
}

function copyLink(){navigator.clipboard.writeText(document.getElementById('inviteLink').innerText);showNotif('✅ Copied!');}
function shareLink(){tg.openLink(`https://t.me/share/url?url=${encodeURIComponent(`https://t.me/capytap_pibot?start=${uid}`)}&text=${encodeURIComponent('Mine Capybara Titan 🚀')}`);}
async function connectWallet(){showNotif('⚠️ Wallet coming soon');}

ui(); updLang();
if(data.end>Math.floor(Date.now()/1000)) run();
</script>
